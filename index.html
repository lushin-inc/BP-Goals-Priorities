<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bullpen · 2026 Goals &amp; Priorities</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #161d31;
    --navy-card: #1d2540;
    --mint: #8fd8b0;
    --green: #2fae70;
    --white: #f5f7fa;
    --muted: #9aa3b8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 32px 48px;
  }
  .wordmark { font-weight: 700; font-size: 28px; letter-spacing: -0.5px; }
  .tagline {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }
  main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
    padding: 20px 48px 40px;
    flex-wrap: wrap;
  }
  .card {
    width: min(440px, 90vw);
    aspect-ratio: 1 / 1;
    background: var(--navy-card);
    border: 1px solid rgba(143, 216, 176, 0.18);
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: rgba(143, 216, 176, 0.5);
    box-shadow: 0 16px 40px rgba(0,0,0,0.4);
  }
  .card .preview {
    flex: 1;
    cursor: pointer;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f1424;
    min-height: 0;
  }
  .card .preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
  }
  .card .bar {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px 22px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .actions { display: flex; gap: 10px; }
  .btn {
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 9px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-view { background: transparent; color: var(--mint); border: 1px solid rgba(143,216,176,0.4); }
  .btn-view:hover { background: rgba(143,216,176,0.1); }
  .btn-dl { background: var(--green); color: #fff; }
  .btn-dl:hover { background: #279160; }
  footer {
    text-align: center;
    padding: 18px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
  }
  footer .chev { color: var(--green); font-weight: 700; letter-spacing: -2px; margin-right: 8px; }

  /* Lightbox */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 14, 26, 0.92);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 4vh 4vw;
  }
  .overlay.open { display: flex; }
  .overlay img {
    max-width: 100%;
    max-height: 100%;
    border-radius: 10px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  }
  .overlay iframe {
    width: min(900px, 92vw);
    height: 90vh;
    border: none;
    border-radius: 10px;
    background: #fff;
  }
  .overlay .close {
    position: absolute;
    top: 20px;
    right: 28px;
    font-size: 34px;
    color: var(--white);
    background: none;
    border: none;
    cursor: pointer;
    line-height: 1;
    font-family: 'Poppins', sans-serif;
  }
  @media (max-width: 1024px) {
    main { gap: 28px; }
  }
</style>
</head>
<body>

<header>
  <div class="wordmark">Bullpen</div>
  <div class="tagline">2026 · Goals &amp; Priorities</div>
</header>

<main>
  <div class="card">
    <div class="preview" onclick="openOverlay('desk')">
      <img src="nav-desk-card.png" alt="Desk Card">
    </div>
    <div class="bar">
      <div class="actions">
        <button class="btn btn-view" onclick="openOverlay('desk')">View</button>
        <a class="btn btn-dl" href="desk-card.png" download="Bullpen Desk Card.png">Download</a>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="preview" onclick="openOverlay('pdf')">
      <img src="nav-three-priorities.png" alt="Three Priorities">
    </div>
    <div class="bar">
      <div class="actions">
        <button class="btn btn-view" onclick="openOverlay('pdf')">View</button>
        <a class="btn btn-dl" href="goals-priorities.pdf" download="Bullpen Goals & Priorities.pdf">Download</a>
      </div>
    </div>
  </div>
</main>

<footer><span class="chev">&rsaquo;&rsaquo;&rsaquo;</span>bullpenre.com · Prepared with Lushin</footer>

<div class="overlay" id="overlay-desk" onclick="closeOverlays(event)">
  <button class="close" aria-label="Close">&times;</button>
  <img src="desk-card.png" alt="Bullpen Desk Card">
</div>

<div class="overlay" id="overlay-pdf" onclick="closeOverlays(event)">
  <button class="close" aria-label="Close">&times;</button>
  <iframe data-src="goals-priorities.pdf" title="Bullpen Goals &amp; Priorities PDF"></iframe>
</div>

<script>
  function openOverlay(which) {
    const el = document.getElementById('overlay-' + which);
    const iframe = el.querySelector('iframe');
    if (iframe && !iframe.src) iframe.src = iframe.dataset.src;
    el.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeOverlays(e) {
    if (e.target.tagName === 'IMG' && e.currentTarget.id === 'overlay-desk') { /* click image closes too */ }
    if (e.target.tagName === 'IFRAME') return;
    e.currentTarget.classList.remove('open');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.querySelectorAll('.overlay.open').forEach(o => o.classList.remove('open'));
      document.body.style.overflow = '';
    }
  });
</script>

</body>
</html>
